<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PANAH UNDER CARE YARDIMLASMA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .auth-header h2 {
            margin-bottom: 10px;
            color: var(--dark-bg);
        }

        .auth-form .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .auth-form label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }

        .auth-form input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .social-login {
            margin-top: 20px;
        }

        .social-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #fff;
        }

        .google-btn {
            background: #db4437;
        }

        .facebook-btn {
            background: #4267B2;
        }

        .auth-footer {
            margin-top: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <!-- HEADER included via JS or copy-paste for simple static site (using simplified header here) -->
    <header class="site-header">
        <div class="container">
            <a href="index.html" class="logo">
                <h1 style="font-size: 20px;">PANAH</h1>
            </a>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Login to manage your sponsorships</p>
        </div>
        <form class="auth-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>

        <div class="social-login">
            <p>Or login with</p>
            <button class="social-btn google-btn"><i class="fa-brands fa-google"></i> Google</button>
            <button class="social-btn facebook-btn"><i class="fa-brands fa-facebook-f"></i> Facebook</button>
        </div>

        <div class="auth-footer">
            <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
    </div>

    <script src="js/main.js?v=17"></script>
</body>

</html>
